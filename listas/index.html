<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercadim Shopp - Listas</title>

  <!-- Fontes e estilos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />

  <!-- Manifest e ícones -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a6dcc" />
  <link rel="apple-touch-icon" href="images/logo.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mercadim Shopp" />
</head>
<body onload="selectCategory('lista-dia-1')">

  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Mercadim Shopp" class="site-logo" />
      <span class="site-title">Mercadim Shopp</span>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="tagline" id="current-category">
      <span class="tagline__emoji">📝</span> Lista Dia 1
    </div>

    <div class="price-disclaimer" role="note" aria-label="Aviso sobre preços">
      Os preços apresentados nos cards têm caráter meramente informativo e podem divergir dos valores praticados pelo vendedor no momento da compra. Consulte a página do vendedor para confirmação de preço, disponibilidade, frete e impostos.
    </div>
  </div>

  <section class="grid" id="product-grid">
    <!-- Produtos da lista serão carregados automaticamente -->
  </section>

  <!-- Botão para voltar à página inicial -->
  <div style="text-align:center; margin:20px;">
    <a href="https://mercadimshopp.com.br/index.html" class="btn-voltar">← IR PARA PÁGINA INICIAL</a>
  </div>

  <!-- Scripts principais -->
  <script src="js/load-products.js"></script>
  <script>
    // Definição das novas categorias
    var categoryNames = {
      'lista-dia-1': { emoji: '📝', name: 'Lista Dia 1' },
      'lista-dia-2': { emoji: '📋', name: 'Lista Dia 2' },
      'lista-dia-3': { emoji: '📑', name: 'Lista Dia 3' },
      'lista-dia-4': { emoji: '🗒️', name: 'Lista Dia 4' },
      'lista-dia-5': { emoji: '🗂️', name: 'Lista Dia 5' }
    };

    function selectCategory(cat) {
      var titleEl = document.getElementById('current-category');
      var info = categoryNames[cat];
      if (titleEl && info) {
        titleEl.innerHTML = '<span class="tagline__emoji">' + info.emoji + '</span> ' + info.name;
      }
      carregarCategoria(cat); // função já existente no seu JS
    }
  </script>
</body>
</html>
